<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>تطبيق استثناء حاسب-101 وحاسب-102 من دمج الفترات...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/7396dfbc2ed49eb10653de8591ca2f5a83b2df4b/index.html';
  let html = await fetch(sourceUrl, {cache:'no-store'}).then(r => r.text());
  const exceptionScript = `<script id="haseb-period-exception">
(function(){
  function isHasebBasic(card){
    const text = card ? card.textContent : '';
    return text.includes('حاسب-101') || text.includes('حاسب-102');
  }
  function applyException(){
    const cards = [...document.querySelectorAll('#trainerTable .lecture-card.split-session')];
    cards.forEach(card => {
      if (!isHasebBasic(card)) return;
      card.classList.remove('split-session','split-start','split-end');
    });
  }
  const style = document.createElement('style');
  style.id = 'haseb-period-exception-style';
  style.textContent = '#trainerTable.trainer-matrix-days .lecture-card:not(.split-session){min-height:auto!important}';
  document.head.appendChild(style);
  let tries = 0;
  const timer = setInterval(() => {
    tries++;
    applyException();
    if (tries > 100) clearInterval(timer);
  }, 250);
})();
<\/script>`;
  html = html.replace('</body>', exceptionScript + '</body>');
  document.open();
  document.write(html);
  document.close();
})();
</script>
</body>
</html>
