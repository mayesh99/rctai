<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>ضبط اسم ملف PDF باسم المدرب...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/d2c56b8bd27e405c3af8486b0619fed710687c09/index.html';
  let html = await fetch(sourceUrl, {cache:'no-store'}).then(r => r.text());
  html = html
    .replace('@page{size:A4 landscape;margin:7mm}', '@page{size:A4 landscape;margin:3mm}')
    .replace('body{display:block!important;margin:0!important;padding:0!important;font-size:9px!important}', 'body{display:block!important;margin:0!important;padding:0!important;font-size:7px!important}')
    .replace('body.printing-trainer #trainerTable{display:table!important;width:100%!important;max-width:100%!important;min-width:0!important;border-collapse:collapse!important;table-layout:fixed!important;page-break-inside:auto!important;font-size:7px!important}', 'body.printing-trainer #trainerTable{display:table!important;width:100%!important;max-width:100%!important;min-width:0!important;border-collapse:collapse!important;table-layout:fixed!important;page-break-inside:auto!important;font-size:5.8px!important;line-height:1.12!important}')
    .replace('body.printing-trainer #trainerTable .day-axis-head,body.printing-trainer #trainerTable .day-cell{width:42px!important;min-width:42px!important}', 'body.printing-trainer #trainerTable .day-axis-head,body.printing-trainer #trainerTable .day-cell{width:28px!important;min-width:28px!important;padding:2px!important}')
    .replace('body.printing-trainer #trainerTable .time-stack{min-width:0!important;padding:3px 2px!important;font-size:7px!important;line-height:1.2!important;border-radius:8px!important}', 'body.printing-trainer #trainerTable .time-stack{min-width:0!important;padding:2px!important;font-size:5.8px!important;line-height:1.1!important;border-radius:6px!important;white-space:normal!important}')
    .replace('body.printing-trainer #trainerTable .lecture-slot{padding:3px!important}', 'body.printing-trainer #trainerTable .lecture-slot{padding:2px!important}')
    .replace('body.printing-trainer #trainerTable .lecture-card{min-height:auto!important;margin:0 0 3px!important;padding:4px 5px!important;border-radius:6px!important;font-size:7px!important;line-height:1.25!important}', 'body.printing-trainer #trainerTable .lecture-card{min-height:auto!important;margin:0 0 2px!important;padding:3px 4px!important;border-radius:5px!important;font-size:5.8px!important;line-height:1.16!important}')
    .replace('body.printing-trainer #trainerTable .lecture-card-head strong{font-size:7px!important;line-height:1.25!important}', 'body.printing-trainer #trainerTable .lecture-card-head strong{font-size:5.8px!important;line-height:1.15!important;overflow-wrap:anywhere!important}')
    .replace('body.printing-trainer #trainerTable .lecture-meta{gap:2px!important;padding-top:3px!important;font-size:6.5px!important;line-height:1.2!important}', 'body.printing-trainer #trainerTable .lecture-meta{gap:1px!important;padding-top:2px!important;font-size:5.4px!important;line-height:1.12!important}')
    .replace('body.printing-trainer #trainerTable .lecture-count{font-size:6.5px!important}', 'body.printing-trainer #trainerTable .lecture-count{font-size:5.4px!important}');

  const filenameScript = '<scr' + 'ipt id="pdf-filename-by-trainer">(' + function(){
    let originalTitle = document.title;
    function safeFilename(name){
      return String(name || '')
        .replace(/[\\/:*?"<>|]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 120);
    }
    function selectedTrainerName(){
      const select = document.querySelector('#trainerFilter') || [...document.querySelectorAll('select')].find(sel => {
        const label = sel.closest('label')?.innerText || '';
        const previous = sel.previousElementSibling?.innerText || '';
        return label.includes('المدرب') || previous.includes('المدرب') || [...sel.options].some(o => o.textContent.includes('كل المدربين'));
      });
      if (!select) return 'جدول المدربين';
      const option = select.selectedOptions && select.selectedOptions[0] ? select.selectedOptions[0] : select.options[select.selectedIndex];
      const name = option ? option.textContent.trim() : '';
      if (!name || name.includes('كل المدربين')) return 'جدول المدربين';
      return 'جدول المدرب - ' + name;
    }
    function setPdfTitle(){
      originalTitle = document.title;
      document.title = safeFilename(selectedTrainerName()) || 'جدول المدربين';
    }
    function restoreTitle(){
      if (originalTitle) document.title = originalTitle;
    }
    document.addEventListener('click', event => {
      const btn = event.target && event.target.closest ? event.target.closest('.print-schedule-btn') : null;
      if (!btn) return;
      setPdfTitle();
      setTimeout(restoreTitle, 7000);
    }, true);
    window.addEventListener('afterprint', restoreTitle);
  }.toString() + ')();</scr' + 'ipt>';
  html = html.replace('</body>', filenameScript + '</body>');
  document.open();
  document.write(html);
  document.close();
})();
</script>
</body>
</html>
