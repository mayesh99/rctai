<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>تخفيف تكرار معلومات المحاضرة الممتدة...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/08f6be914f99a78c26f5abce94478a7792d03d25/index.html';
  try {
    let html = await fetch(sourceUrl, {cache:'no-store'}).then(r => {
      if (!r.ok) throw new Error('تعذر تحميل التطبيق');
      return r.text();
    });
    const extraCss = "#trainerTable.trainer-matrix-days .lecture-card.split-end{display:flex!important;align-items:center!important;justify-content:center!important;min-height:78px!important}#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-card-head{display:flex!important;align-items:center!important;justify-content:center!important;margin:0!important;padding:0!important}#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-card-head strong,#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-course,#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-meta{display:none!important}#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-card-head:after{content:'استكمال نفس المحاضرة';margin:0!important;padding:6px 10px!important;border-radius:999px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;font-size:12px;font-weight:900}";
    html = html.replace("#trainerTable.trainer-matrix-days .lecture-card.split-end:before{display:none}`;", "#trainerTable.trainer-matrix-days .lecture-card.split-end:before{display:none}" + extraCss + "`;" );
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    document.body.innerHTML = '<div class="loading"><div><strong>تعذر تحميل الجدول</strong><span>'+String(err.message || err)+'</span></div></div>';
  }
})();
</script>
</body>
</html>
