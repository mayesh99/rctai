<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>توحيد تصميم خليتي المحاضرة الممتدة...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/341b816dae1342a2148d1499cc9607ba80adfd6e/index.html';
  try {
    let html = await fetch(sourceUrl, {cache:'no-store'}).then(r => {
      if (!r.ok) throw new Error('تعذر تحميل التطبيق');
      return r.text();
    });
    const unifiedStyle = `<style id="split-unified-polish">
#trainerTable.trainer-matrix-days .lecture-slot:has(.split-session){background:#fff8db!important}
#trainerTable.trainer-matrix-days .lecture-card.split-start,#trainerTable.trainer-matrix-days .lecture-card.split-end{min-height:112px!important;background:linear-gradient(180deg,#fff8db,#fffdf2)!important;border-color:#f5c542!important;box-shadow:0 12px 26px rgba(180,126,0,.16)!important}
#trainerTable.trainer-matrix-days .lecture-card.split-start{border-inline-end:0!important;border-start-end-radius:0!important;border-end-end-radius:0!important;margin-inline-end:-14px!important}
#trainerTable.trainer-matrix-days .lecture-card.split-end{border-inline-start:0!important;border-start-start-radius:0!important;border-end-start-radius:0!important;margin-inline-start:-14px!important;display:block!important}
#trainerTable.trainer-matrix-days .lecture-card.split-start:after{content:'';position:absolute;inset-inline-end:-18px;top:-1px;bottom:-1px;width:20px;background:linear-gradient(180deg,#fff8db,#fffdf2);border-block:1px solid #f5c542;z-index:2}
#trainerTable.trainer-matrix-days .lecture-card.split-end .lecture-card-head:after{content:''!important;display:none!important}
</style>`;
    const inject = "html = html.replace('</head>', " + JSON.stringify(unifiedStyle) + " + '</head>');\n        document.write(html);";
    html = html.replace(/document\.write\(html\);/g, inject);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    document.body.innerHTML = '<div class="loading"><div><strong>تعذر تحميل الجدول</strong><span>'+String(err.message || err)+'</span></div></div>';
  }
})();
</script>
</body>
</html>
