<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الموقع</strong><span>تفعيل تسجيل الدخول...</span></div>
<script>
(async function(){
  const sourceUrl='https://raw.githack.com/mayesh99/rctai/b2d525051662c54ca675348ade23a647ef981171/index.html';
  const html=await fetch(sourceUrl,{cache:'no-store'}).then(r=>r.text());
  document.open();document.write(html);document.close();

  const HEAD_CODE='1234';
  let contacts=[];
  const cleanPhone=v=>{let d=String(v||'').replace(/\D/g,''); if(d.startsWith('00'))d=d.slice(2); if(d.startsWith('966'))return d; if(d.startsWith('0'))return '966'+d.slice(1); if(d.length===9&&d.startsWith('5'))return '966'+d; return d;};
  const cleanName=v=>String(v||'').replace(/[إأآا]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/[^\u0600-\u06FF\s]/g,' ').replace(/\s+/g,' ').trim();
  function parseSimpleCsv(text){
    return String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).filter(Boolean).map(line=>line.split(',').map(x=>x.trim()));
  }
  async function loadContacts(){
    if(contacts.length) return contacts;
    let text='';
    for(const url of [new URL('tr99.csv',location.href).href,'https://raw.githack.com/mayesh99/rctai/main/tr99.csv']){
      try{const r=await fetch(url,{cache:'no-store'}); if(r.ok){text=await r.text(); break;}}catch(e){}
    }
    const rows=parseSimpleCsv(text); const head=rows.shift()||[];
    const ni=head.findIndex(h=>/الاسم|name/i.test(h)); const pi=head.findIndex(h=>/الجوال|جوال|phone|mobile/i.test(h));
    contacts=rows.map(r=>({name:r[ni>=0?ni:0]||'',phone:cleanPhone(r[pi>=0?pi:2]||'')})).filter(x=>x.name&&x.phone);
    return contacts;
  }
  function score(a,b){
    a=cleanName(a); b=cleanName(b); if(!a||!b)return 0; if(a===b)return 100; if(a.includes(b)||b.includes(a))return 70;
    const aa=a.split(' ').filter(x=>x.length>1), bb=b.split(' ').filter(x=>x.length>1); return bb.filter(x=>aa.includes(x)).length*12;
  }
  function trainerSelect(){return document.querySelector('#trainerFilter')||[...document.querySelectorAll('select')].find(s=>[...s.options].some(o=>o.textContent.includes('كل المدربين')));}
  function setTrainer(name){
    const s=trainerSelect(); if(!s)return false; let bi=-1,bs=0;
    [...s.options].forEach((o,i)=>{const sc=score(name,o.textContent); if(sc>bs){bs=sc;bi=i;}});
    if(bi<0||bs<24)return false; s.selectedIndex=bi; s.value=s.options[bi].value; s.dispatchEvent(new Event('change',{bubbles:true}));
    const apply=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('تطبيق الفلترة')); if(apply)apply.click(); return true;
  }
  function trainerTab(){const b=[...document.querySelectorAll('.tabs button,.tab')].find(x=>x.textContent.trim()==='جداول المدربين'); if(b&&!b.classList.contains('active'))b.click();}
  function authStyle(){
    if(document.querySelector('#site-login-style'))return;
    const st=document.createElement('style'); st.id='site-login-style'; st.textContent=`
      body.auth-locked header,body.auth-locked main{display:none!important}.login-screen{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;background:linear-gradient(180deg,#f8fafc,#edf8f2);padding:20px}.login-card{width:min(440px,100%);background:#fff;border:1px solid #dbe8e1;border-radius:16px;box-shadow:0 18px 50px rgba(15,23,42,.14);padding:24px}.login-card h2{margin:0 0 8px;color:#0f513f}.login-card p{margin:0 0 16px;color:#64748b;line-height:1.7}.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.role-tabs button{border:1px solid #cfe7dc;border-radius:10px;background:#f6fbf8;color:#0f513f;padding:11px;font-weight:900;cursor:pointer}.role-tabs button.active{background:#0f766e;color:#fff}.login-card label{display:block;margin:10px 0 6px;font-weight:900}.login-card input{box-sizing:border-box;width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:12px;font-size:15px}.login-card .submit{width:100%;border:0;border-radius:10px;background:#0f766e;color:white;padding:13px;margin-top:16px;font-weight:900}.login-error{display:none;margin-top:12px;color:#991b1b;background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:10px}.login-error.show{display:block}.auth-bar{display:none;align-items:center;justify-content:space-between;gap:10px;max-width:1160px;margin:12px auto;background:#ecf8f2;border:1px solid #cfe7dc;border-radius:12px;padding:10px 14px}.auth-bar strong{color:#0f513f}.auth-bar button{border:1px solid #cbd5e1;background:#fff;border-radius:9px;padding:8px 12px}.trainer-only header,.trainer-only .source-panel,.trainer-only .tabs,.trainer-only .filters,.trainer-only .actions,.trainer-only .note,.trainer-only .stats{display:none!important}.trainer-only .auth-bar,.dept-mode .auth-bar{display:flex}.trainer-only main{margin-top:12px}`;
    document.head.appendChild(st);
  }
  function authBar(auth){
    if(!document.querySelector('.auth-bar')){const b=document.createElement('div'); b.className='auth-bar'; b.innerHTML='<strong></strong><button>تسجيل خروج</button>'; document.body.insertBefore(b,document.body.firstChild); b.querySelector('button').onclick=()=>{sessionStorage.removeItem('rctaiAuth');location.reload();};}
    document.querySelector('.auth-bar strong').textContent=auth.role==='trainer'?'جدول المدرب: '+auth.name:'دخول رئيس القسم';
  }
  function showLogin(){
    if(document.querySelector('.login-screen'))return; document.body.classList.add('auth-locked');
    const el=document.createElement('div'); el.className='login-screen'; el.innerHTML=`<form class="login-card"><h2>تسجيل الدخول</h2><p>المدرب يدخل برقم الجوال المسجل، ورئيس القسم يدخل بالرمز.</p><div class="role-tabs"><button type="button" class="active" data-role="trainer">مدرب</button><button type="button" data-role="head">رئيس القسم</button></div><label>رقم الجوال</label><input inputmode="numeric" placeholder="05xxxxxxxx"><button class="submit">دخول</button><div class="login-error"></div></form>`; document.body.appendChild(el);
    let role='trainer'; const input=el.querySelector('input'), label=el.querySelector('label'), err=el.querySelector('.login-error');
    el.querySelectorAll('.role-tabs button').forEach(btn=>btn.onclick=()=>{role=btn.dataset.role; el.querySelectorAll('.role-tabs button').forEach(b=>b.classList.toggle('active',b===btn)); label.textContent=role==='trainer'?'رقم الجوال':'رمز رئيس القسم'; input.placeholder=role==='trainer'?'05xxxxxxxx':'رمز الدخول'; input.value=''; err.classList.remove('show');});
    el.querySelector('form').onsubmit=async e=>{e.preventDefault(); err.classList.remove('show'); if(role==='head'){if(input.value.trim()!==HEAD_CODE){err.textContent='رمز رئيس القسم غير صحيح.'; err.classList.add('show'); return;} sessionStorage.setItem('rctaiAuth',JSON.stringify({role:'head',name:'رئيس القسم'})); applyAuth(); return;} await loadContacts(); const p=cleanPhone(input.value); const t=contacts.find(x=>x.phone===p||x.phone.endsWith(p)||p.endsWith(x.phone)); if(!t){err.textContent='لم أجد رقم الجوال في بيانات المدربين.'; err.classList.add('show'); return;} sessionStorage.setItem('rctaiAuth',JSON.stringify({role:'trainer',name:t.name,phone:t.phone})); applyAuth();};
  }
  function applyAuth(){
    authStyle(); let auth=null; try{auth=JSON.parse(sessionStorage.getItem('rctaiAuth')||'null');}catch(e){}
    if(!auth){showLogin(); return;} document.body.classList.remove('auth-locked'); document.querySelector('.login-screen')?.remove(); authBar(auth);
    document.body.classList.toggle('trainer-only',auth.role==='trainer'); document.body.classList.toggle('dept-mode',auth.role==='head');
    if(auth.role==='trainer'){trainerTab(); setTrainer(auth.name);}
  }
  authStyle(); loadContacts(); let n=0; setInterval(()=>{n++; applyAuth();},500); applyAuth();
})();
</script>
</body>
</html>
