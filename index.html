<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>ربط واتساب ببيانات المدربين...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/f92f4390bffdfd9b6abdf77aae762cf317a8f40a/index.html';
  const html = await fetch(sourceUrl, {cache:'no-store'}).then(r => r.text());
  document.open();
  document.write(html);
  document.close();

  let trainerContacts = [];
  function parseCsv(text){
    const rows = [];
    let row = [], cell = '', quoted = false;
    text = String(text || '').replace(/^\uFEFF/, '');
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (ch === '"') {
        if (quoted && next === '"') { cell += '"'; i++; }
        else quoted = !quoted;
      } else if (ch === ',' && !quoted) {
        row.push(cell); cell = '';
      } else if ((ch === '\n' || ch === '\r') && !quoted) {
        if (ch === '\r' && next === '\n') i++;
        row.push(cell); cell = '';
        if (row.some(v => String(v).trim())) rows.push(row);
        row = [];
      } else cell += ch;
    }
    row.push(cell);
    if (row.some(v => String(v).trim())) rows.push(row);
    return rows;
  }
  function normalizeName(value){
    return String(value || '').replace(/[إأآا]/g, 'ا').replace(/ى/g, 'ي').replace(/ة/g, 'ه').replace(/[^\u0600-\u06FF\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function normalizePhone(value){
    let digits = String(value || '').replace(/\D/g, '');
    if (!digits) return '';
    if (digits.startsWith('00')) digits = digits.slice(2);
    if (digits.startsWith('0')) digits = '966' + digits.slice(1);
    else if (digits.length === 9 && digits.startsWith('5')) digits = '966' + digits;
    return digits;
  }
  async function loadTrainerContacts(){
    if (trainerContacts.length) return trainerContacts;
    const urls = [new URL('tr99.csv', location.href).href, 'https://raw.githack.com/mayesh99/rctai/main/tr99.csv'];
    let text = '';
    for (const url of urls) {
      try {
        const res = await fetch(url, {cache:'no-store'});
        if (res.ok) { text = await res.text(); break; }
      } catch(e) {}
    }
    const rows = parseCsv(text);
    const header = rows.shift() || [];
    const nameIndex = header.findIndex(h => /الاسم|name/i.test(h));
    const phoneIndex = header.findIndex(h => /الجوال|جوال|هاتف|phone|mobile/i.test(h));
    trainerContacts = rows.map(r => ({
      name: (r[nameIndex >= 0 ? nameIndex : 0] || '').trim(),
      phone: normalizePhone(r[phoneIndex >= 0 ? phoneIndex : 2] || '')
    })).filter(x => x.name && x.phone);
    return trainerContacts;
  }
  function trainerSelect(){
    return document.querySelector('#trainerFilter') || [...document.querySelectorAll('select')].find(sel => [...sel.options].some(o => o.textContent.includes('كل المدربين')));
  }
  function selectedTrainerName(){
    const select = trainerSelect();
    if (!select) return '';
    const option = select.selectedOptions && select.selectedOptions[0] ? select.selectedOptions[0] : select.options[select.selectedIndex];
    const name = option ? option.textContent.trim() : '';
    return name.includes('كل المدربين') ? '' : name;
  }
  function findContact(name){
    const target = normalizeName(name);
    if (!target) return null;
    let best = null, bestScore = 0;
    const targetTokens = target.split(' ').filter(t => t.length > 1);
    for (const contact of trainerContacts) {
      const current = normalizeName(contact.name);
      if (!current) continue;
      let score = 0;
      if (target === current) score += 100;
      if (target.includes(current) || current.includes(target)) score += 60;
      const currentTokens = current.split(' ').filter(t => t.length > 1);
      const overlap = currentTokens.filter(t => targetTokens.includes(t)).length;
      score += overlap * 12;
      if (score > bestScore) { best = contact; bestScore = score; }
    }
    return bestScore >= 24 ? best : null;
  }
  function activateTrainerTab(){
    const trainerTab = [...document.querySelectorAll('.tabs button,.tab')].find(btn => btn.textContent.trim() === 'جداول المدربين');
    if (trainerTab && !trainerTab.classList.contains('active')) trainerTab.click();
  }
  function ensureWhatsAppStyle(){
    if (document.querySelector('#whatsapp-share-style')) return;
    const style = document.createElement('style');
    style.id = 'whatsapp-share-style';
    style.textContent = `.whatsapp-share-btn{display:inline-flex!important;align-items:center!important;gap:7px!important;background:#16a34a!important;color:#fff!important;border-color:#16a34a!important}.whatsapp-share-btn:before{content:'☏';font-weight:900}@media print{.whatsapp-share-btn{display:none!important}}`;
    document.head.appendChild(style);
  }
  function setPdfTitle(name){
    document.title = name ? ('جدول المدرب - ' + name).replace(/[\\/:*?"<>|]+/g, ' ') : 'جدول المدربين';
  }
  function addWhatsAppTool(){
    if (document.querySelector('.whatsapp-share-btn')) return true;
    const actions = document.querySelector('.actions');
    if (!actions) return false;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action secondary whatsapp-share-btn';
    btn.textContent = 'إرسال واتساب';
    btn.title = 'حفظ جدول المدرب PDF ثم فتح واتساب على رقم المدرب';
    btn.addEventListener('click', async () => {
      const trainerName = selectedTrainerName();
      if (!trainerName) {
        alert('اختر مدرب محدد من فلتر المدرب قبل الإرسال عبر واتساب.');
        return;
      }
      await loadTrainerContacts();
      const contact = findContact(trainerName);
      if (!contact || !contact.phone) {
        alert('لم أجد رقم جوال هذا المدرب في ملف بيانات المدربين tr99.csv.');
        return;
      }
      activateTrainerTab();
      setPdfTitle(trainerName);
      const message = `السلام عليكم\nمرفق لكم جدولكم التدريبي بصيغة PDF.\n\n${document.title}`;
      setTimeout(() => {
        document.body.classList.add('printing-trainer');
        window.print();
        setTimeout(() => {
          document.body.classList.remove('printing-trainer');
          window.open('https://wa.me/' + contact.phone + '?text=' + encodeURIComponent(message), '_blank', 'noopener,noreferrer');
        }, 900);
      }, 200);
    });
    actions.appendChild(btn);
    return true;
  }
  function initWhatsApp(){
    ensureWhatsAppStyle();
    addWhatsAppTool();
  }
  initWhatsApp();
  setInterval(initWhatsApp, 600);
})();
</script>
</body>
</html>
