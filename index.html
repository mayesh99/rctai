<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>جداول المدربين والقاعات</title>
  <style>
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}
    .loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}
    .loading strong{display:block;font-size:20px;margin-bottom:8px;color:#007a53}.loading span{color:#64748b}
  </style>
</head>
<body>
  <div class="loading"><strong>جاري تجهيز الجدول</strong><span>تحميل آخر نسخة وربط جدول المتدربين بملف SS05...</span></div>
  <script>
    (async function(){
      const sourceUrl = "https://raw.githack.com/mayesh99/rctai/40cf3f47a2cd5f14312a022cc2a167670c1539c1/index.html";
      const overrideRender = `<script>
function renderTraineeSchedule(matches, traineeId) {
  if (!matches.length) {
    renderTraineeMessage(traineeScheduleLoaded ? "لا يوجد جدول مطابق لرقم المتدرب " + traineeId : "ارفع ملف جدول المتدربين أولاً أو أضفه في GitHub بجانب الصفحة");
    return;
  }
  const traineeName = matches.find(row => row.traineeName)?.traineeName || "";
  traineeEls.summary.textContent = (traineeName ? traineeName + " - " : "") + "رقم المتدرب: " + traineeId + " | عدد المحاضرات: " + matches.length;
  const activeDays = DAYS_ORDER.filter(day => matches.some(row => row.day === day));
  const slotsMap = new Map();
  matches.forEach(row => {
    if (!slotsMap.has(row.slotKey)) slotsMap.set(row.slotKey, { key: row.slotKey, start: row.start, end: row.end, startMin: row.startMin, endMin: row.endMin });
  });
  const slots = [...slotsMap.values()].sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin);
  const grouped = new Map();
  matches.forEach(row => {
    const key = row.day + "|" + row.slotKey;
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(row);
  });
  const card = row => '<article class="lecture-card"><div class="lecture-card-head"><strong>' + escapeHtml(row.courseName || row.course) + '</strong></div><div class="lecture-course"><span class="course-code">' + escapeHtml(row.courseName || row.course) + '</span></div><div class="lecture-meta"><span>' + escapeHtml(row.trainer) + '</span><span>' + escapeHtml(row.roomNumber || row.roomName || "بدون قاعة") + '</span></div><div class="lecture-count">' + escapeHtml(row.lectureDesc) + '</div></article>';
  traineeEls.table.className = "schedule-table trainer-matrix trainer-matrix-days trainee-matrix";
  traineeEls.table.innerHTML = '<thead><tr><th class="day-axis-head">اليوم</th>' + slots.map(slot => '<th class="time-head"><span class="badge period time-stack"><span>' + escapeHtml(slot.start) + '</span><span class="time-sep">إلى</span><span>' + escapeHtml(slot.end) + '</span></span></th>').join('') + '</tr></thead><tbody>' + activeDays.map(day => '<tr><th class="day-cell">' + escapeHtml(day) + '</th>' + slots.map(slot => { const items = grouped.get(day + "|" + slot.key) || []; return '<td class="lecture-slot ' + (items.length ? 'has-lecture' : '') + '">' + (items.length ? items.map(card).join('') : '<span class="empty-slot">-</span>') + '</td>'; }).join('') + '</tr>').join('') + '</tbody>';
}
<\/script>`;
      try {
        let html = await fetch(sourceUrl, { cache: "no-store" }).then(res => {
          if (!res.ok) throw new Error("تعذر تحميل التطبيق");
          return res.text();
        });
        html = html
          .replaceAll("GitHub: trainees.csv", "GitHub: SS05.csv")
          .replaceAll("trainees.csv", "SS05.csv")
          .replaceAll("trainees.csv ثم ابحث", "SS05.csv ثم ابحث")
          .replace("const files = [\"SS05.csv\", \"students.csv\", \"trainee_schedule.csv\", \"student_schedule.csv\",", "const files = [\"SS05.csv\", \"ss05.csv\", \"SS05.CSV\", \"students.csv\", \"trainee_schedule.csv\", \"student_schedule.csv\",")
          .replace(".trainee-matrix{min-width:1180px}@media", ".trainee-matrix{min-width:1180px}body.trainee-schedule-view .filters,body.trainee-schedule-view .actions,body.trainee-schedule-view .note,body.trainee-schedule-view .stats{display:none!important}@media")
          .replace("originalSwitchView(view);\n  traineeEls.panel.classList.toggle", "originalSwitchView(view);\n  document.body.classList.toggle(\"trainee-schedule-view\", view === \"traineeSchedule\");\n  traineeEls.panel.classList.toggle")
          .replace("</body>", overrideRender + "</body>");
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        document.body.innerHTML = '<div class="loading"><strong>تعذر تحميل الجدول</strong><span>'+String(err.message || err)+'</span></div>';
      }
    })();
  </script>
</body>
</html>
