<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>جداول المدربين والقاعات</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}.loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}.loading strong{display:block;color:#007a53;margin-bottom:8px;font-size:20px}.loading span{color:#64748b}
</style>
</head>
<body>
<div class="loading"><strong>جاري تجهيز الجدول</strong><span>إضافة زر إرسال الجدول عبر واتساب...</span></div>
<script>
(async function(){
  const sourceUrl = 'https://raw.githack.com/mayesh99/rctai/f92f4390bffdfd9b6abdf77aae762cf317a8f40a/index.html';
  const html = await fetch(sourceUrl, {cache:'no-store'}).then(r => r.text());
  document.open();
  document.write(html);
  document.close();

  function trainerSelect(){
    return document.querySelector('#trainerFilter') || [...document.querySelectorAll('select')].find(sel => [...sel.options].some(o => o.textContent.includes('كل المدربين')));
  }
  function selectedTrainerTitle(){
    const select = trainerSelect();
    if (!select) return 'جدول المدربين';
    const option = select.selectedOptions && select.selectedOptions[0] ? select.selectedOptions[0] : select.options[select.selectedIndex];
    const name = option ? option.textContent.trim() : '';
    if (!name || name.includes('كل المدربين')) return 'جدول المدربين';
    return 'جدول المدرب - ' + name;
  }
  function activateTrainerTab(){
    const trainerTab = [...document.querySelectorAll('.tabs button,.tab')].find(btn => btn.textContent.trim() === 'جداول المدربين');
    if (trainerTab && !trainerTab.classList.contains('active')) trainerTab.click();
  }
  function ensureWhatsAppStyle(){
    if (document.querySelector('#whatsapp-share-style')) return;
    const style = document.createElement('style');
    style.id = 'whatsapp-share-style';
    style.textContent = `.whatsapp-share-btn{display:inline-flex!important;align-items:center!important;gap:7px!important;background:#16a34a!important;color:#fff!important;border-color:#16a34a!important}.whatsapp-share-btn:before{content:'☏';font-weight:900}@media print{.whatsapp-share-btn{display:none!important}}`;
    document.head.appendChild(style);
  }
  function addWhatsAppTool(){
    if (document.querySelector('.whatsapp-share-btn')) return true;
    const actions = document.querySelector('.actions');
    if (!actions) return false;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action secondary whatsapp-share-btn';
    btn.textContent = 'إرسال واتساب';
    btn.title = 'إرسال رابط جدول المدرب عبر واتساب';
    btn.addEventListener('click', () => {
      activateTrainerTab();
      const title = selectedTrainerTitle();
      const link = location.href.split('#')[0];
      const message = `${title}\n\nرابط الجدول:\n${link}\n\nيمكن حفظ الجدول PDF من زر طباعة PDF داخل الصفحة.`;
      window.open('https://wa.me/?text=' + encodeURIComponent(message), '_blank', 'noopener,noreferrer');
    });
    actions.appendChild(btn);
    return true;
  }
  function initWhatsApp(){
    ensureWhatsAppStyle();
    addWhatsAppTool();
  }
  initWhatsApp();
  setInterval(initWhatsApp, 600);
})();
</script>
</body>
</html>
