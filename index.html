<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>جداول المدربين والقاعات</title>
  <style>
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;min-height:100vh;place-items:center}
    .loading{width:min(520px,calc(100% - 32px));background:#fff;border:1px solid #dbe5ef;border-radius:16px;padding:22px;box-shadow:0 14px 36px rgba(15,23,42,.06);text-align:center}
    .loading strong{display:block;font-size:20px;margin-bottom:8px;color:#007a53}.loading span{color:#64748b}
  </style>
</head>
<body>
  <div class="loading"><strong>جاري تجهيز الجدول</strong><span>تطبيق التصميم الجديد وفصل الفترة المسائية...</span></div>
  <script>
    (async function(){
      const sourceUrl = "https://raw.githack.com/mayesh99/rctai/40cf3f47a2cd5f14312a022cc2a167670c1539c1/index.html";
      const polishCss = "body.trainee-schedule-view .filters,body.trainee-schedule-view .actions,body.trainee-schedule-view .note,body.trainee-schedule-view .stats{display:none!important}#traineeSchedulePanel{background:linear-gradient(180deg,#ffffff,#f8fbfa);border-color:#d8e9df}#traineeSchedulePanel h2{display:flex;align-items:center;gap:10px;margin-bottom:16px}#traineeSchedulePanel h2:before{content:'▦';display:inline-grid;place-items:center;width:34px;height:34px;border-radius:10px;background:#e5f4ed;color:#007a53}.trainee-tools{display:grid;grid-template-columns:minmax(260px,1fr) auto auto;gap:12px;align-items:end;margin:0 0 14px;padding:14px;border:1px solid #dbe5ef;border-radius:14px;background:#fff}.trainee-tools input{height:44px;background:#fff}.trainee-summary{display:inline-flex;align-items:center;gap:8px;color:#006c45;font-weight:800;margin:6px 0 14px;padding:8px 12px;border-radius:999px;background:#e9f8f0}.trainee-matrix,#trainerTable.trainer-matrix-days{min-width:1180px;border:0!important;background:transparent!important}.trainee-matrix thead th,#trainerTable.trainer-matrix-days thead th{background:#0f766e!important;color:#fff!important;border-color:#0f766e!important;text-align:center}.trainee-matrix .day-axis-head,#trainerTable.trainer-matrix-days .day-axis-head{width:112px!important;border-radius:0 10px 0 0}.trainee-matrix thead th:last-child,#trainerTable.trainer-matrix-days thead th:last-child{border-radius:10px 0 0 0}.trainee-matrix .time-stack,#trainerTable.trainer-matrix-days .time-stack{background:rgba(255,255,255,.14)!important;color:#fff!important;padding:7px 10px}.trainee-matrix .time-sep,#trainerTable.trainer-matrix-days .time-sep{color:#d9fff0!important}.trainee-matrix .day-cell,#trainerTable.trainer-matrix-days .day-cell{background:#ecf8f2!important;color:#0f513f!important;font-weight:900!important;border-inline-start:1px solid #dbe5ef}.trainee-matrix .lecture-slot,#trainerTable.trainer-matrix-days .lecture-slot{background:#fff!important;padding:10px!important;border-color:#e4eee8!important}.trainee-matrix .lecture-slot.has-lecture,#trainerTable.trainer-matrix-days .lecture-slot.has-lecture{background:#fbfefd!important}.trainee-matrix .lecture-card,#trainerTable.trainer-matrix-days .lecture-card{position:relative;border:1px solid #cfe7dc!important;border-radius:12px!important;background:linear-gradient(180deg,#ffffff,#f8fffb)!important;padding:12px!important;box-shadow:0 10px 24px rgba(15,23,42,.07)!important;margin-bottom:10px!important}.trainee-matrix .lecture-card:before,#trainerTable.trainer-matrix-days .lecture-card:before{content:'';position:absolute;inset-inline-start:0;top:10px;bottom:10px;width:4px;border-radius:999px;background:#007a53}.trainee-matrix .lecture-card-head,#trainerTable.trainer-matrix-days .lecture-card-head{margin-bottom:10px!important;padding-inline-start:8px}.trainee-matrix .lecture-card-head strong,#trainerTable.trainer-matrix-days .lecture-card-head strong{display:block;color:#102f27!important;font-size:14px!important;line-height:1.55!important}.trainee-matrix .lecture-course,#trainerTable.trainer-matrix-days .lecture-course{display:flex!important;flex-wrap:wrap;gap:7px!important;margin:0 0 10px!important}.trainee-matrix .room-code,#trainerTable.trainer-matrix-days .room-code{background:#e5f4ed!important;color:#006c45!important;border:1px solid #c9eadb!important;border-radius:999px!important;padding:5px 9px!important;font-size:12px!important;font-weight:800!important}.trainee-matrix .lecture-meta,#trainerTable.trainer-matrix-days .lecture-meta{display:grid!important;grid-template-columns:1fr;gap:5px!important;margin-top:0!important;border-top:1px solid #e7f2ec!important;padding-top:9px!important;color:#52645d!important;font-size:12px!important}.trainee-matrix .lecture-meta span:first-child,#trainerTable.trainer-matrix-days .lecture-meta span:first-child{font-weight:800;color:#174435}.trainee-matrix .empty-slot,#trainerTable.trainer-matrix-days .empty-slot{min-height:82px!important;border:1px dashed #d8e9df;border-radius:12px;background:#fbfefd;color:#b4c4bd}@media(max-width:900px){.trainee-tools{grid-template-columns:1fr}}";
      const behaviorTag = `<script>
(function(){
  const style = document.createElement('style');
  style.id = 'schedule-polish';
  style.textContent = ${JSON.stringify(polishCss)};
  document.head.appendChild(style);
  const splitEvening = row => {
    const longEvening = row && row.startMin === 750 && row.endMin >= 950;
    if (!longEvening) return [row];
    return [
      {...row,start:'12:30',end:'14:10',startMin:750,endMin:850,slotKey:'750-850',timeLabel:'12:30 - 14:10'},
      {...row,start:'14:15',end:'15:55',startMin:855,endMin:955,slotKey:'855-955',timeLabel:'14:15 - 15:55'}
    ];
  };
  if (typeof approvedPeriods === 'function') {
    approvedPeriods = function(){
      return [
        { key:'morning-full', label:'كامل الصباح 08:00 - 11:40', start:'08:00', end:'11:40', startMin:480, endMin:700 },
        { key:'evening-first', label:'الفترة المسائية الأولى 12:30 - 14:10', start:'12:30', end:'14:10', startMin:750, endMin:850 },
        { key:'evening-second', label:'الفترة المسائية الثانية 14:15 - 15:55', start:'14:15', end:'15:55', startMin:855, endMin:955 }
      ];
    };
  }
  if (typeof renderTrainerTable === 'function') {
    const originalRenderTrainerTable = renderTrainerTable;
    renderTrainerTable = function(data){ return originalRenderTrainerTable(data.flatMap(splitEvening)); };
  }
  if (typeof getFilteredRows === 'function') {
    const oldGetFilteredRows = getFilteredRows;
    getFilteredRows = function(){
      const result = oldGetFilteredRows();
      const period = els.periodFilter.value;
      if (!period.startsWith('range:')) return result;
      const selectedRange = approvedPeriods().find(p => p.key === period.slice(6));
      return selectedRange ? rows.filter(r =>
        (els.trainerFilter.value === 'all' || r.trainer === els.trainerFilter.value) &&
        (els.dayFilter.value === 'all' || r.day === els.dayFilter.value) &&
        (r.startMin < selectedRange.endMin && r.endMin > selectedRange.startMin) &&
        (els.roomFilter.value === 'all' || r.roomNumber === els.roomFilter.value) &&
        (els.roomCategoryFilter.value === 'all' || r.roomCategory === els.roomCategoryFilter.value)
      ) : result;
    };
  }
  if (typeof populateFilters === 'function' && typeof applyFilters === 'function') { populateFilters(); applyFilters(); }
})();
<\/script>`;
      try {
        let html = await fetch(sourceUrl, { cache: "no-store" }).then(res => {
          if (!res.ok) throw new Error("تعذر تحميل التطبيق");
          return res.text();
        });
        const newTraineeCard = "const card = row => '<article class=\\\"lecture-card\\\"><div class=\\\"lecture-card-head\\\"><strong>' + escapeHtml(row.courseName || row.course) + '</strong></div><div class=\\\"lecture-course\\\"><span class=\\\"room-code\\\">القاعة: ' + escapeHtml([row.roomNumber, row.roomName].filter(Boolean).filter((value, index, list) => list.indexOf(value) === index).join(' - ') || \\\"بدون قاعة\\\") + '</span></div><div class=\\\"lecture-meta\\\"><span>' + escapeHtml(row.trainer) + '</span><span>' + escapeHtml(row.lectureDesc) + '</span></div></article>';\n  traineeEls.table.className";
        const injectBehavior = "html = html.replace('</body>', " + JSON.stringify(behaviorTag) + " + '</body>');\n        document.open();\n        document.write(html);";
        html = html
          .replaceAll("GitHub: trainees.csv", "GitHub: SS05.csv")
          .replaceAll("trainees.csv", "SS05.csv")
          .replaceAll("trainees.csv ثم ابحث", "SS05.csv ثم ابحث")
          .replace("const files = [\"SS05.csv\", \"students.csv\", \"trainee_schedule.csv\", \"student_schedule.csv\",", "const files = [\"SS05.csv\", \"ss05.csv\", \"SS05.CSV\", \"students.csv\", \"trainee_schedule.csv\", \"student_schedule.csv\",")
          .replace("const roomName = pickValue(item, [\"اسم القاعة\", \"وصف القاعة\", \"Room Name\"]);", "const roomName = pickValue(item, [\"اسم الغرفة\", \"الغرفة\", \"اسم القاعة\", \"وصف القاعة\", \"Room Name\", \"Room Title\"]);")
          .replace("courseName: pickValue(item, [\"وصف المقرر\", \"اسم المقرر\", \"Course Name\", \"Course Description\"])", "courseName: pickValue(item, [\"عنوان المقرر\", \"وصف المقرر\", \"اسم المقرر\", \"Course Title\", \"Course Name\", \"Course Description\"])")
          .replace("originalSwitchView(view);\n  traineeEls.panel.classList.toggle", "originalSwitchView(view);\n  document.body.classList.toggle(\"trainee-schedule-view\", view === \"traineeSchedule\");\n  traineeEls.panel.classList.toggle")
          .replace(/const card = row => '<article class=[\s\S]*?<\/article>';\n  traineeEls\.table\.className/, newTraineeCard)
          .replace(/document\.open\(\);\s*document\.write\(html\);/, injectBehavior);
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        document.body.innerHTML = '<div class="loading"><strong>تعذر تحميل الجدول</strong><span>'+String(err.message || err)+'</span></div>';
      }
    })();
  </script>
</body>
</html>
